name: Linux

# paths-ignore set: docs/asset-only changes don't need a full multi-platform
# build matrix to fire. Anything that can affect build/test output (source,
# CMake, scripts, workflow YAML itself) is NOT in the ignore list and still
# triggers the run. Mirrored in macos.yml, windows.yml, test.yml, and the
# push: branches:[main] trigger of release-latest.yml.
on:
  push:
    paths-ignore: &doc-paths
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.git-blame-ignore-revs'
      - 'cliff.toml'
  pull_request:
    paths-ignore: *doc-paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v5

      - name: Install SDL3
        uses: libsdl-org/setup-sdl@4ebea449684c989388fe6bcea0460e300d13a5ae # main @ 2025-12-20
        id: sdl
        with:
          install-linux-dependencies: true
          version: 3-latest
          build-type: ${{ env.BUILD_TYPE }}

      # UASM is not required for this job (game + host tests: discovery + console state). ASM equivalence uses test.yml + Docker.
      - name: Install latest CMake and ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}" \
            -DLBA2_BUILD_TESTS=ON \
            -DLBA2_BUILD_ASM_EQUIV_TESTS=OFF \
            --preset linux

      - name: Build
        run: |
          cmake --build build --target lba2cc
          cmake --build build --target host_tests

      - name: Host tests
        run: cd build && ctest -L host_quick --output-on-failure

      - name: Verify Binary
        run: test -f build/SOURCES/lba2cc && echo "Build successful"
