name: Linux
on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install SDL3
        uses: libsdl-org/setup-sdl@main
        id: sdl
        with:
          install-linux-dependencies: true
          version: 3-latest
          build-type: ${{ env.BUILD_TYPE }}

      - name: Install UASM
        uses: supplypike/setup-bin@v3
        with:
          uri: 'https://github.com/Terraspace/UASM/releases/download/v2.57r/uasm257_linux64.zip'
          name: 'uasm'
          version: '2.57'

      - name: Install latest CMake and ninja
        uses: lukka/get-cmake@latest

      - name: Code Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}" \
            -DLBA2_BUILD_TESTS=ON \
            -DLBA2_BUILD_ASM_EQUIV_TESTS=OFF \
            --preset linux

      - name: Build
        run: |
          cmake --build build --target lba2
          cmake --build build --target test_res_discovery

      - name: Host tests (game data discovery)
        run: cd build && ctest -R test_res_discovery --output-on-failure

      - name: Verify Binary
        run: test -f build/SOURCES/lba2 && echo "Build successful"
