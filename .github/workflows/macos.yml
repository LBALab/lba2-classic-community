name: macOS

# See linux.yml for paths-ignore rationale.
on:
  push:
    paths-ignore: &doc-paths
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.git-blame-ignore-revs'
      - 'cliff.toml'
  pull_request:
    paths-ignore: *doc-paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v5

      - name: Install SDL3
        uses: libsdl-org/setup-sdl@4ebea449684c989388fe6bcea0460e300d13a5ae # main @ 2025-12-20
        id: sdl
        with:
          install-linux-dependencies: true
          version: 3-latest
          build-type: ${{ env.BUILD_TYPE }}

      - name: Install latest CMake and ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}" \
            -DLBA2_BUILD_TESTS=ON \
            -DLBA2_BUILD_ASM_EQUIV_TESTS=OFF \
            --preset macos_arm64

      - name: Build
        run: |
          cmake --build build --target lba2cc
          cmake --build build --target host_tests

      - name: Host tests
        run: cd build && ctest -L host_quick --output-on-failure

      - name: Verify Binary
        # CMake's MACOSX_BUNDLE wiring (in SOURCES/CMakeLists.txt) puts the
        # binary inside an .app bundle. The bare build/SOURCES/lba2cc path
        # only exists for non-Apple builds.
        run: |
          test -d build/SOURCES/lba2cc.app
          test -x build/SOURCES/lba2cc.app/Contents/MacOS/lba2cc
          echo "Build successful"
