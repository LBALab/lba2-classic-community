name: Windows

# See linux.yml for paths-ignore rationale.
on:
  push:
    paths-ignore: &doc-paths
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.git-blame-ignore-revs'
      - 'cliff.toml'
  pull_request:
    paths-ignore: *doc-paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-sdl3

      - name: Code Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLBA2_BUILD_TESTS=ON \
            -DLBA2_BUILD_ASM_EQUIV_TESTS=OFF \
            --preset windows_ucrt64

      - name: Build
        run: |
          cmake --build build --target lba2cc
          cmake --build build --target host_tests

      - name: Host tests
        run: cd build && ctest -L host_quick --output-on-failure

      - name: Verify Binary
        run: test -f build/SOURCES/lba2cc.exe && echo "Build successful"
